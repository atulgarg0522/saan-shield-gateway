# A generic, single-database configuration.

[alembic]
# path to migration scripts
# We point this to our infra folder or backend migrations folder.
script_location = migrations

# template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to truncate the migration filename
truncate_slug_length = 40

# set to 'true' to run the environment during the
# 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be imported that are not
# relative to the alembic directory
# prepend_sys_path = false

# the output encoding used when writing new migration files
# output_encoding = utf-8

# Use our global default PostgreSQL connection (asyncpg)
sqlalchemy.url = postgresql+asyncpg://postgres:postgres_secure_password@db:5432/saan_ai_gateway

[post_write_hooks]

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
